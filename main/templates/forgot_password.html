{% load i18n%}
{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* Navbar background color */
        .navbar-custom {
            background-color: #536f8a; /* You can change to any color */
        }
        .navbar-brand {
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .brand-text {
            display: flex;
            flex-direction: column; /* Stack Odia above English */
            line-height: 1;
            color:black;
        }
        .brand-text span {
            display: block;
        }
        .brand-text .odia {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .brand-text .english {
            font-size: 1rem;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg,#74ebd5,#ACB6E5);">
    <nav class="navbar navbar-expand-lg navbar-custom text-white">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
        <img src="{% static 'images/LOGO.png' %}" class="logo" alt="Logo">
        <div class="brand-text">
            <span class="odia">ସହାୟିକା</span>
            <span class="english">Sahayika</span>
        </div>
    </a>
    <div class="d-flex ms-auto">
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">{% trans "Back" %}</a>
    </div>

  </div>
</nav>

<div class="container mt-5" style="max-width:500px;">

<h2>{% trans "Reset Password" %}</h2>

<form method="POST">
    {% csrf_token %}

    {% trans "Phone:" %}<br>
    <input type="text" name="phone"><br><br>

     {%trans "SHG Name:" %}<br>
    <input type="text" name="shgname"><br><br>

    {% trans "New Password:" %}<br>
    <input type="password" name="password"><br><br>

    <button type="submit">{% trans "Reset Password" %}</button>
</form>

<p>{{message}}</p>

</div>
</body>
</html>
