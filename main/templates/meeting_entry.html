{% load i18n%}
{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Monthly SHG Meeting</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        

        
        /* Navbar background color */
        .navbar-custom {
            background-color: #536f8a; /* You can change to any color */
        }
        .navbar-brand {
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .brand-text {
            display: flex;
            flex-direction: column; /* Stack Odia above English */
            line-height: 1;
            color:black;
        }
        .brand-text span {
            display: block;
        }
        .brand-text .odia {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .brand-text .english {
            font-size: 1rem;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg,#74ebd5,#ACB6E5);">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom text-white">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
        <img src="{% static 'images/LOGO.png' %}" class="logo" alt="Logo">
        <div class="brand-text">
            <span class="odia">ସହାୟିକା</span>
            <span class="english">Sahayika</span>
        </div>
    </a>
    <div class="d-flex ms-auto">
    <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm">{% trans "Back" %}</a>
    </div>
  </div>
</nav>


<div class="container mt-5" style="max-width:500px;">

<h3>{% trans "Monthly SHG Meeting" %}</h3>

<form method="POST">

{% csrf_token %}
{% trans "Member:"%}<br>
<select name="member" class="form-control mb-2"><br><br>

{% for m in members %}
<option value="{{ m.fullname }}">{{ m.fullname }}</option><br><br>

{% endfor %}

</select><br><br>
{% trans "Date:" %}<br>
<input type="date" name="date" class="form-control mb-2" required><br><br>

{% trans "Attendance:"%}<br>
<select name="attendance" class="form-control mb-2"><br><br>

<option>{% trans "Present" %}</option>
<option>{% trans "Absent" %}</option>

</select><br><br>

{% trans "Note:"%}<br>
<textarea name="notes" class="form-control mb-2" placeholder="Meeting Notes"></textarea><br><br>

<button class="btn btn-success">{% trans "Save" %}</button>

</form>

</div>
</body>
</html>
