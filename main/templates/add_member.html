{% load i18n%}
{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Member</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        
        /* Navbar background color */
        .navbar-custom {
            background-color: #536f8a; /* You can change to any color */
        }
        .navbar-brand {
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .brand-text {
            display: flex;
            flex-direction: column; /* Stack Odia above English */
            line-height: 1;
            color:black;
        }
        .brand-text span {
            display: block;
        }
        .brand-text .odia {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .brand-text .english {
            font-size: 1rem;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg,#74ebd5,#ACB6E5);">


<nav class="navbar navbar-expand-lg navbar-custom text-white">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
        <img src="{% static 'images/LOGO.png' %}" class="logo" alt="Logo">
        <div class="brand-text">
            <span class="odia">ସହାୟିକା</span>
            <span class="english">Sahayika</span>
        </div>
    </a>
    <div class="d-flex ms-auto">
        <span class="text-white me-3">{% trans "Hello," %} {{ request.session.user_name }}</span>
        
    </div>
  </div>
</nav>

<div class="container mt-5" style="max-width:500px;">
<h3>{% trans "Add Member" %}</h3>

{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
{% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}
<input type="text" name="fullname" placeholder="Full Name" class="form-control mb-3">
<input type="text" name="phone" placeholder="Phone Number" class="form-control mb-3">
<div class="mb-3">
    <label>{% trans "Aadhaar Number" %}</label>
    <input type="text" id="aadhaar_number" name="aadhaar_number" maxlength="12" class="form-control" oninput="validateAadhaar()">
    <span id="aadhaar_status"></span>
  </div>

  <div class="mb-3">
    <label>{% trans "Aadhaar Photo" %}</label>
    <input type="file" id="aadhaar_photo" name="aadhaar_photo" onchange="previewImage(this, 'aadhaar_preview')">
    <img id="aadhaar_preview" style="width:100px; display:none;">
  </div>

  <div class="mb-3">
    <label>{% trans "Profile Photo" %}</label>
    <input type="file" id="Profile_photo" name="Profile_photo" onchange="previewImage(this, 'member_preview')">
    <img id="member_preview" style="width:100px; display:none;">
  </div>
 <div class="mb-3">
    <label>DOB</label>
    <input type="date" name="dob" class="form-control mb-2">
 </div>

<select name="role" class="form-control mb-3">
<option value="Member">Member</option>
<option value="President">President</option>
</select>
<button type="submit" class="btn btn-success w-100">{% trans "Save" %}</button>
</form>

</div>

<script>

function validateAadhaar() {
    const aadhar = document.getElementById('aadhaar_number').value;
    const status = document.getElementById('aadhaar_status');
    if(/^\d{12}$/.test(aadhar)) {
        status.textContent = "Valid format";
        status.style.color = "green";
    } else {
        status.textContent = "Invalid Aadhaar";
        status.style.color = "red";
    }
}

function previewImage(input, previewId) {
    const file = input.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            const img = document.getElementById(previewId);
            img.src = e.target.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
}
</script>

</body>
</html>
